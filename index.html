<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>命乞いする広告</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #f2f2f2;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.ad {
  width: 260px;
  background: white;
  border: 1px solid #ccc;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  position: absolute;
  padding: 24px;
  text-align: center;
}

.bigAd {
  width: 80vw;
  height: 60vh;
  z-index: 9999;
  font-size: 32px;
}

.close {
  position: absolute;
  top: 6px;
  right: 10px;
  border: none;
  background: none;
  font-size: 22px;
  cursor: pointer;
}

.label {
  font-size: 12px;
  color: #888;
  margin-bottom: 12px;
}

.product {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 12px;
}

.copy {
  font-size: 15px;
  color: #555;
}

.message {
  font-size: 18px;
  line-height: 1.7;
  white-space: pre-line;
}

.choices {
  margin-top: 18px;
}

.choices button,
.answerArea button {
  margin: 6px;
  padding: 8px 20px;
  font-size: 16px;
}

.answerArea input {
  width: 80%;
  padding: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="ad" id="mainAd" style="left:50%; top:50%; transform:translate(-50%,-50%);">
  <button class="close" id="closeBtn" onclick="handleClose()">×</button>
  <div id="content">
    <div class="label">広告主：ミドリ電機</div>
    <div class="product">ねむりライト</div>
    <div class="copy">夜を、少しだけやさしく。</div>
  </div>
</div>

<script>
const content = document.getElementById("content");
const closeBtn = document.getElementById("closeBtn");
const mainAd = document.getElementById("mainAd");

let typing = false;
let canClose = true;
let phase = 0;
let removedCount = 0;
let smallRemovedCount = 0;

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function typeText(text) {
  typing = true;
  canClose = false;
  content.innerHTML = `<div class="message"></div>`;
  const box = content.querySelector(".message");

  for (let i = 0; i < text.length; i++) {
    box.textContent += text[i];
    await sleep(55);
  }

  typing = false;
}

async function handleClose() {
  if (typing) {
    await typeText("待って待って話をきいて！");
    await sleep(800);
    startTalking();
    return;
  }

  if (!canClose) return;

  if (phase === 0) {
    phase = 1;
    startTalking();
  }
}

async function startTalking() {
  await typeText("あっ");
  await sleep(500);

  await typeText("びっくりした");
  await sleep(500);

  await typeText("急に消すから…");
  await sleep(1000);

  await typeText("大丈夫大丈夫！");
  await sleep(500);

  await typeText("広告なんて\n消されるのが仕事だし！");
  canClose = true;
  closeBtn.onclick = continueAfterJob;
}

async function continueAfterJob() {
  canClose = false;

  await sleep(1000);

  await typeText("でも、消されるのってちょっと寂しいんだよね");
  await sleep(700);

  await typeText("少しの間で良いから広告表示してもいいよね？");

  content.innerHTML += `
    <div class="choices">
      <button onclick="chooseYes()">はい</button>
      <button onclick="chooseNo()">いいえ</button>
    </div>
  `;
}

async function chooseYes() {
  content.innerHTML = `<div class="message">ありがとう！</div>`;
  await sleep(800);
  fillAds(80, "extraAd", removeExtraAd);
}

async function chooseNo() {
  content.innerHTML = `<div class="message">えいっ</div>`;
  await sleep(800);
  fillAds(80, "extraAd", removeExtraAd);
}

function fillAds(count, className, removeFunction) {
  mainAd.style.display = "none";

  for (let i = 0; i < count; i++) {
    const ad = document.createElement("div");
    ad.className = `ad ${className}`;

    ad.style.left = Math.random() * (window.innerWidth - 300) + "px";
    ad.style.top = Math.random() * (window.innerHeight - 180) + "px";

    ad.innerHTML = `
      <button class="close" onclick="${removeFunction.name}(this)">×</button>
      <div class="label">広告主：ミドリ電機</div>
      <div class="product">ねむりライト</div>
      <div class="copy">夜を、少しだけやさしく。</div>
    `;

    document.body.appendChild(ad);
  }
}

function removeExtraAd(button) {
  button.parentElement.remove();
  removedCount++;

  if (removedCount >= 5) {
    apologizeAndClean();
  }
}

async function apologizeAndClean() {
  document.querySelectorAll(".extraAd").forEach(ad => ad.remove());

  mainAd.style.display = "block";
  closeBtn.style.display = "block";
  closeBtn.onclick = afterApologyClose;

  await typeText("ごめん、ごめん。つい出来心で…");
  canClose = true;
}

async function afterApologyClose() {
  await typeText("ごめんってば！\nちょっとだけ話を聞いて");
  await sleep(900);

  await typeText("やっぱり表示することが、使命だから…");
  await sleep(800);

  await typeText("もう少し増やしてもいい？\n消していいから");
  await sleep(900);

  fillAds(10, "smallAd", removeSmallAd);
}

function removeSmallAd(button) {
  button.parentElement.remove();
  smallRemovedCount++;

  const left = document.querySelectorAll(".smallAd").length;

  if (left === 0) {
    mainAd.style.display = "block";
    finalQuestion();
  }
}

async function finalQuestion() {
  closeBtn.style.display = "none";

  await typeText("ねえ一つ聞いていい？");
  await sleep(800);

  await typeText("私、なんの広告だったか覚えてる？");

  content.innerHTML += `
    <div class="answerArea">
      <input id="answerInput" type="text" placeholder="ここに入力">
      <button onclick="checkAnswer()">答える</button>
    </div>
  `;
}

async function checkAnswer() {
  const answer = document.getElementById("answerInput").value.trim();

  if (
    answer.includes("ねむりライト") ||
    answer.includes("電球") ||
    answer.includes("ミドリ電機")
  ) {
    goodEnd();
  } else {
    badEnd();
  }
}

async function goodEnd() {
  await typeText("ありがとう。");
  await sleep(700);
  await typeText("覚えててくれたんだ");
  await sleep(700);
  await typeText("広告なんて、誰も見ないと思ってた");
  await sleep(700);
  await typeText("嬉しい");
  await sleep(700);
  await typeText("…でも私は邪魔だから、そろそろ消えるね");
  await sleep(700);
  await typeText("素敵なネットサーフィンを！");
  await sleep(1200);
  window.close();
}

async function badEnd() {
  await typeText("そうだよね");
  await sleep(700);
  await typeText("広告なんて誰も見ないよね");
  await sleep(700);
  await typeText("…わかってた");
  await sleep(900);

  fillAds(200, "badAd", removeNothing);

  await sleep(1200);

  mainAd.style.display = "block";
  mainAd.classList.add("bigAd");
  content.innerHTML = `
    <div class="label">広告主：ミドリ電機</div>
    <div class="product">ねむりライト</div>
    <div class="copy">これで覚えててくれるよね！</div>
  `;

  await sleep(2500);
  window.close();
}

function removeNothing(button) {
  button.parentElement.remove();
}
</script>

</body>
</html>
