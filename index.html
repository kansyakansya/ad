<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>命乞いする広告</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  overflow: hidden;
}

/* 背景記事ページ（モテに関するダミー文章） */
.page {
  width: 90%;
  max-width: 720px;
  margin: 20px auto;
  background: #fff;
  padding: 20px;
  line-height: 1.8;
  box-sizing: border-box;
}

.page h1 {
  font-size: 28px;
  color: #e60012;
  line-height: 1.4;
  border-bottom: 4px solid #e60012;
  padding-bottom: 10px;
}

.page h2 {
  font-size: 20px;
  margin-top: 28px;
  color: #333;
  border-left: 6px solid #ff6600;
  padding-left: 10px;
}

.page p { margin-bottom: 16px; }

/* 広告 */
.ad {
  width: 400px;
  height: 200px;
  background: rgba(128,128,128,0.8);
  border: 2px solid #444;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  position: absolute;
  padding: 24px;
  text-align: center;
  z-index: 10;
}

.main {
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}

.close {
  position: absolute;
  top: 6px;
  right: 10px;
  border: none;
  background: none;
  font-size: 24px;
  cursor: pointer;
  color: white;
  font-weight: bold;
}

.product {
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 12px;
  color: white;
}

.copy {
  font-size: 16px;
  color: #fff;
}

.message {
  font-size: 18px;
  line-height: 1.7;
  white-space: pre-line;
}

.choices button,
.answerArea button {
  margin: 6px;
  padding: 8px 20px;
  font-size: 16px;
}

.answerArea input {
  width: 80%;
  padding: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<!-- 背景記事 -->
<div class="page">
  <h1>これだけ読めば必ずモテる120箇条！</h1>
  <p>第1条：自信を持つこと。第2条：笑顔を忘れない。第3条：清潔感を意識する。…（中略）第120条：日々感謝する心を持つ。</p>
  <p>読んだだけで、異性の視線が変わる…かもしれません。</p>
</div>

<!-- 広告 -->
<div class="ad main" id="mainAd">
  <button class="close" id="closeBtn">×</button>
  <div id="content">
    <div class="product">怪しい広告タイトル</div>
    <div class="copy">読む前に邪魔する広告</div>
  </div>
</div>

<script>
const mainAd = document.getElementById("mainAd");
const content = document.getElementById("content");
const closeBtn = document.getElementById("closeBtn");

let typing = false;
let canClose = true;

closeBtn.addEventListener("click", handleClose);

async function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function typeText(text){
  typing = true;
  content.innerHTML = `<div class="message"></div>`;
  const box = content.querySelector(".message");
  for(let i=0;i<text.length;i++){
    box.textContent += text[i];
    await sleep(50);
  }
  typing = false;
}

async function handleClose(){
  if(typing){
    content.innerHTML = `<div class="message">待って待って！話を聞いて！</div>`;
    return;
  }
  if(!canClose) return;
  canClose=false;
  await typeText("広告を消すのは簡単だけど…");
  await sleep(800);
  await typeText("少しだけ話を聞いてほしい！");
  await sleep(1000);
  canClose=true;
}
</script>

</body>
</html>
